# .github/workflows/package_torchscript.yml
name: Package TorchScript Model (torch-2.2)

on:
  workflow_dispatch:

jobs:
  export-torchscript:
    runs-on: ubuntu-latest
    steps:

    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.9"

    # -------------------------------------------------------------
    # 1) Core deps – install torch first so later builds can import it
    # -------------------------------------------------------------
    - name: Install Torch & TorchVision (CPU)
      run: |
        python -m pip install --upgrade pip
        pip install torch==2.2.2+cpu torchvision==0.17.2+cpu \
          --index-url https://download.pytorch.org/whl/cpu

    # -------------------------------------------------------------
    # 2) Pre-built PyG wheels that match torch-2.2
    # -------------------------------------------------------------
    - name: Install PyG wheels
      run: |
        # Use the official PyG index that hosts pre-compiled binaries
        PYG_IDX="https://data.pyg.org/whl/torch-2.2.0+cpu.html"
        pip install pyg_lib torch_scatter torch_sparse torch_cluster torch_spline_conv \
          -f ${PYG_IDX}

    # -------------------------------------------------------------
    # 3) Everything else – tell pip NOT to resolve deps again
    # -------------------------------------------------------------
    - name: Install remaining requirements
      run: |
        pip install -r requirements.txt --no-deps
        # Prior-Depth-Anything itself
        pip install "git+https://github.com/SpatialVision/Prior-Depth-Anything.git" --no-deps

    # -------------------------------------------------------------
    # 4) Download checkpoint and export TorchScript
    # -------------------------------------------------------------
    - name: Fetch checkpoint
      run: |
        mkdir -p checkpoints
        wget -O checkpoints/prior_depth_anything_vitb.pth \
          https://huggingface.co/Rain729/Prior-Depth-Anything/resolve/main/prior_depth_anything_vitb.pth

    - name: Export TorchScript
      run: |
        python - <<'PY'
        import torch, pathlib
        from prior_depth_anything import PriorDepthAnything

        ckpt = "checkpoints/prior_depth_anything_vitb.pth"
        model = PriorDepthAnything(device="cpu",
                                   frozen_model_size="vitb",
                                   conditioned_model_size="vitb",
                                   coarse_only=False)
        model.load_state_dict(torch.load(ckpt, map_location="cpu"), strict=False)
        model.eval()

        class DepthOnly(torch.nn.Module):
            def __init__(self, net): super().__init__(); self.net = net
            def forward(self, x):
                d = self.net.depth_estimator(x)
                return d["predicted_depth"] if isinstance(d, dict) else d

        torch.jit.script(DepthOnly(model)).save("prior_depth_anything_vitb.pt")
        pathlib.Path("prior_depth_anything_vitb.pt").stat()  # prove file exists
        PY

    - uses: actions/upload-artifact@v4
      with:
        name: prior_depth_anything_vitb_pt
        path: prior_depth_anything_vitb.pt
